    <style>
      /* Desain Fleksibel & Responsif Global */
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f4f6f9;
        color: #333;
        margin: 0;
        padding: 10px;
        box-sizing: border-box;
      }

      /* Container Fleksibel menyesuaikan ukuran layar laptop/tablet/HP */
      .container {
        width: 100%;
        max-width: 600px;
        background: white;
        margin: 20px auto;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        box-sizing: border-box;
      }

      h2 {
        color: #0275d8;
        margin-top: 0;
        text-align: center;
        font-size: 1.5rem;
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        font-weight: bold;
        display: block;
        margin-bottom: 8px;
        font-size: 0.95rem;
      }

      /* Kotak Radio Button Prodi dengan scroll otomatis */
      .radio-box {
        max-height: 220px;
        overflow-y: auto;
        border: 1px solid #ccc;
        padding: 10px;
        border-radius: 4px;
        background: #fafafa;
      }

      .radio-item {
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        font-size: 0.9rem;
      }

      .radio-item input {
        margin-right: 10px;
        cursor: pointer;
        min-width: 18px;
        min-height: 18px;
      }

      select {
        width: 100%;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
        font-size: 0.95rem;
        background-color: #fff;
      }

      /* Wrapper Input Password + Tombol Mata */
      .password-wrapper {
        position: relative;
        display: flex;
        align-items: center;
      }

      .password-wrapper input[type="password"],
      .password-wrapper input[type="text"] {
        width: 100%;
        padding: 12px;
        padding-right: 45px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
        font-size: 0.95rem;
      }

      .toggle-password {
        position: absolute;
        right: 12px;
        cursor: pointer;
        color: #666;
        user-select: none;
        font-size: 1.1rem;
      }

      button {
        background-color: #0275d8;
        color: white;
        border: none;
        padding: 14px 20px;
        width: 100%;
        border-radius: 4px;
        cursor: pointer;
        font-size: 1rem;
        font-weight: bold;
        margin-top: 10px;
        transition: background 0.2s;
      }

      button:hover {
        background-color: #0157a2;
      }

      .error {
        color: #d9534f;
        background: #fdf7f7;
        padding: 12px;
        border-left: 4px solid #d9534f;
        margin-bottom: 15px;
        border-radius: 4px;
        display: none;
        font-size: 0.9rem;
      }

      .step-indicator {
        display: flex;
        justify-content: space-between;
        margin-bottom: 25px;
        font-size: 0.8rem;
      }

      .step-badge {
        padding: 6px 10px;
        background: #e9ecef;
        border-radius: 20px;
        color: #6c757d;
        text-align: center;
        flex: 1;
        margin: 0 4px;
      }

      .step-badge.active {
        background: #0275d8;
        color: white;
        font-weight: bold;
      }

      .page {
        display: none;
      }

      .page.active {
        display: block;
      }

      .info-box {
        background: #eef7ff;
        padding: 12px;
        border-radius: 4px;
        margin-bottom: 20px;
        font-size: 0.9rem;
        line-height: 1.4;
      }

      .back-link {
        display: block;
        text-align: center;
        margin-top: 18px;
        color: #6c757d;
        text-decoration: none;
        font-size: 0.9rem;
      }

      .back-link:hover {
        text-decoration: underline;
      }

      .hint-text {
        font-size: 0.8rem;
        color: #28a745;
        margin-top: 6px;
        display: block;
      }

      @media (max-width: 480px) {
        body {
          padding: 5px;
        }
        .container {
          margin: 10px auto;
          padding: 15px;
        }
        h2 {
          font-size: 1.25rem;
        }
        .step-indicator {
          font-size: 0.7rem;
        }
        .step-badge {
          padding: 4px 6px;
          margin: 0 2px;
        }
        button {
          padding: 12px 15px;
        }
      }
    </style>
  </head>

    <div class="container">
      <h2>Sistem Akses Drive Dosen FPTI</h2>

      <div class="step-indicator">
        <span id="badge-1" class="step-badge active">1. Pilih Dosen</span>
        <span id="badge-2" class="step-badge">2. Validasi</span>
        <span id="badge-3" class="step-badge">3. Drive</span>
      </div>

      <div id="error-message" class="error"></div>

      <div id="page-1" class="page active">
        <div class="form-group">
          <label>Pilih Program Studi (Prodi):</label>
          <div class="radio-box" id="prodi-container"></div>
        </div>

        <div class="form-group">
          <label for="dosen-select">Pilih Nama Dosen:</label>
          <select id="dosen-select" onchange="sembunyikanError()">
            <option value="">-- Pilih Prodi Terlebih Dahulu --</option>
          </select>
        </div>

        <button type="button" onclick="keHalaman2()">
          Lanjutkan ke Halaman 2
        </button>
      </div>

      <div id="page-2" class="page">
        <div class="info-box">
          <strong>Dosen Terpilih:</strong><br />
          <span id="review-dosen">-</span> (<span id="review-prodi">-</span>)
        </div>

        <div class="form-group">
          <label for="password-input">Masukkan Password Keamanan Dosen:</label>
          <div class="password-wrapper">
            <input
              type="password"
              id="password-input"
              placeholder="Masukkan password angka"
            />
            <span
              class="toggle-password"
              id="eye-icon"
              onclick="togglePasswordVisibility()"
              >👁️</span
            >
          </div>
          <span class="hint-text" id="password-hint"></span>
        </div>

        <button type="button" onclick="keHalaman3()">
          Verifikasi & Buka Google Drive
        </button>
        <a href="#" class="back-link" onclick="keHalaman1()"
          >&larr; Kembali ke Halaman 1</a
        >
      </div>

      <div id="page-3" class="page">
        <div
          class="info-box"
          style="
            background: #e6f4ea;
            border-left: 4px solid #24b47e;
            text-align: center;
          "
        >
          <strong style="color: #137333">✓ Autentikasi Berhasil!</strong><br />
          <p style="margin: 8px 0 0 0">
            Membuka Google Drive milik <br /><strong id="final-dosen"></strong
            >...
          </p>
        </div>
        <p style="text-align: center; font-size: 0.85rem; color: #666">
          Jika halaman Drive tidak otomatis terbuka, klik tombol di bawah:
        </p>
        <button
          type="button"
          id="btn-redirect"
          style="background-color: #24b47e"
        >
          Buka Drive Manual
        </button>
        <a href="#" class="back-link" onclick="keHalaman1()">Mulai dari Awal</a>
      </div>
    </div>

      let prodiTerpilih = "";
      let dosenTerpilih = "";
      let passwordTarget = "";
      let driveTarget = ""; // Menyimpan link drive target dosen terpilih

      // Otomatis men-generate semua Radio Buttons Prodi ke layar
      const prodiContainer = document.getElementById("prodi-container");
      Object.keys(dataDosen).forEach((prodi, idx) => {
        const div = document.createElement("div");
        div.className = "radio-item";
        div.innerHTML = `
            <input type="radio" name="prodi_option" id="prodi_${idx}" value="${prodi}" onchange="pilihProdi(this.value)">
            <label style="font-weight: normal; margin:0; cursor:pointer;" for="prodi_${idx}">${prodi}</label>
        `;
        prodiContainer.appendChild(div);
      });

      function pilihProdi(namaProdi) {
        prodiTerpilih = namaProdi;
        const selectDosen = document.getElementById("dosen-select");
        selectDosen.innerHTML =
          '<option value="">-- Pilih Nama Dosen --</option>';

        dataDosen[namaProdi].forEach((dosen, index) => {
          const opt = document.createElement("option");
          opt.value = index;
          opt.textContent = dosen.nama;
          selectDosen.appendChild(opt);
        });
        sembunyikanError();
      }

      // Fungsi tombol mata untuk sembunyikan/tampilkan password
      function togglePasswordVisibility() {
        const passInput = document.getElementById("password-input");
        const eyeIcon = document.getElementById("eye-icon");
        if (passInput.type === "password") {
          passInput.type = "text";
          eyeIcon.textContent = "🙈";
        } else {
          passInput.type = "password";
          eyeIcon.textContent = "👁️";
        }
      }

      function tampilkanError(teks) {
        const errDiv = document.getElementById("error-message");
        errDiv.textContent = teks;
        errDiv.style.display = "block";
        window.scrollTo(0, 0);
      }

      function sembunyikanError() {
        document.getElementById("error-message").style.display = "none";
      }

      function keHalaman1() {
        sembunyikanError();
        document.getElementById("password-input").value = "";
        document.getElementById("password-input").type = "password";
        document.getElementById("eye-icon").textContent = "👁️";

        document.getElementById("page-2").classList.remove("active");
        document.getElementById("page-3").classList.remove("active");
        document.getElementById("page-1").classList.add("active");

        document.getElementById("badge-2").classList.remove("active");
        document.getElementById("badge-3").classList.remove("active");
        document.getElementById("badge-1").classList.add("active");
      }

      function keHalaman2() {
        const selectDosen = document.getElementById("dosen-select");
        const idxDosen = selectDosen.value;

        if (!prodiTerpilih) {
          tampilkanError(
            "Peringatan: Silakan pilih Program Studi terlebih dahulu!",
          );
          return;
        }
        if (idxDosen === "") {
          tampilkanError("Peringatan: Silakan pilih nama dosen!");
          return;
        }

        sembunyikanError();
        const objekDosen = dataDosen[prodiTerpilih][idxDosen];
        dosenTerpilih = objekDosen.nama;
        passwordTarget = objekDosen.pass;
        driveTarget = objekDosen.drive; // Mengambil tautan spesifik milik dosen

        document.getElementById("review-prodi").textContent = prodiTerpilih;
        document.getElementById("review-dosen").textContent = dosenTerpilih;

        document.getElementById("page-1").classList.remove("active");
        document.getElementById("page-2").classList.add("active");

        document.getElementById("badge-1").classList.remove("active");
        document.getElementById("badge-2").classList.add("active");
      }

      function keHalaman3() {
        const inputPass = document.getElementById("password-input").value;

        if (inputPass !== passwordTarget) {
          tampilkanError(
            "Password angka salah! Periksa kembali kode akses unik dosen tersebut.",
          );
          return;
        }

        sembunyikanError();
        document.getElementById("final-dosen").textContent = dosenTerpilih;

        document.getElementById("page-2").classList.remove("active");
        document.getElementById("page-3").classList.add("active");

        document.getElementById("badge-2").classList.remove("active");
        document.getElementById("badge-3").classList.add("active");

        // Jika data link 'drive' dosen ada, gunakan link tersebut. Jika kosong, gunakan pencarian default.
        const tautanDrive =
          driveTarget && driveTarget !== "https://drive.google.com/..."
            ? driveTarget
            : "https://drive.google.com/drive/search?q=" +
              encodeURIComponent(dosenTerpilih);

        window.open(tautanDrive, "_blank");

        document.getElementById("btn-redirect").onclick = function () {
          window.open(tautanDrive, "_blank");
        };
      }
